<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoría - MesaMaestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body class="pagina-listado">
  <div id="navbar-container"></div>

  <main class="container my-5">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="../index.html">Inicio</a></li>
        <li class="breadcrumb-item"><a href="categorias.html">Categorías</a></li>
        <li class="breadcrumb-item active" id="breadcrumb-categoria">Categoría</li>
      </ol>
    </nav>
    <div class="encabezado-pagina anim-fade-in">
      <h1 id="titulo-categoria" class="titulo-pagina"></h1>
      <p id="desc-categoria" class="encabezado-subtitulo"></p>
    </div>
    <div class="row" id="juegos-categoria"></div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/carrito.js"></script>
  <script src="../js/productos.js"></script>
  <script src="../js/componentes.js"></script>
  <script>
    /* Listado de juegos filtrado por categoría (?id= en URL) */
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('../');
      renderizarFooter('../');

      const params = new URLSearchParams(window.location.search);
      const catId = params.get('id');
      const categoria = CATEGORIAS.find(c => c.id === catId);

      if (!categoria) {
        document.getElementById('titulo-categoria').textContent = 'Categoría no encontrada';
        return;
      }

      document.title = categoria.nombre + ' - MesaMaestra';
      document.getElementById('breadcrumb-categoria').textContent = categoria.nombre;
      document.getElementById('titulo-categoria').textContent = categoria.icono + ' ' + categoria.nombre;
      document.getElementById('desc-categoria').textContent = categoria.descripcion;

      const juegos = obtenerJuegosPorCategoria(catId);
      renderizarListaJuegos(document.getElementById('juegos-categoria'), juegos, '../');
    });
  </script>
</body>
</html>
