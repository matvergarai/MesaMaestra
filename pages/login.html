<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - MesaMaestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container auth-main my-5">
    <div class="encabezado-pagina anim-fade-in">
      <h1 class="titulo-pagina">Iniciar sesión</h1>
      <p class="encabezado-subtitulo">Accede a tu cuenta para comprar y gestionar tu perfil</p>
    </div>

    <div class="formulario-auth anim-fade-in" style="animation-delay: 0.1s">
      <form id="form-login" onsubmit="return validarLogin(event)" novalidate>
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuario o correo</label>
          <input type="text" class="form-control" id="usuario" name="usuario" required
            autocomplete="username" placeholder="Tu usuario o email">
          <div class="mensaje-error" id="error-usuario"></div>
        </div>

        <div class="mb-0">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" name="password" required
            autocomplete="current-password" placeholder="Tu contraseña">
          <div class="mensaje-error" id="error-password"></div>
        </div>

        <div class="mensaje-error auth-mensaje-global d-none" id="mensaje-error-login"></div>

        <div class="auth-acciones">
          <button type="submit" class="btn btn-principal btn-pulse w-100">Ingresar</button>
        </div>
      </form>

      <p class="auth-demo-nota">Cuentas de prueba: <strong>admin</strong> / Admin123 · <strong>cliente</strong> / Cliente123</p>

      <nav class="auth-enlaces" aria-label="Opciones de acceso">
        <a href="registro.html" class="auth-enlace">¿No tienes cuenta? Regístrate</a>
        <a href="recuperar.html" class="auth-enlace auth-enlace--secundario">¿Olvidaste tu contraseña?</a>
      </nav>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/carrito.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="../js/componentes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('../');
      renderizarFooter('../');
    });
  </script>
</body>
</html>
