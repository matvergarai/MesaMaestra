<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorías - MesaMaestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container my-5">
    <div class="encabezado-pagina anim-fade-in">
      <h1 class="titulo-pagina">Nuestras Categorías</h1>
      <p class="encabezado-subtitulo">Elige el estilo de juego que más te guste explorando nuestras categorías</p>
    </div>
    <div class="row g-4" id="lista-categorias"></div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/carrito.js"></script>
  <script src="../js/productos.js"></script>
  <script src="../js/componentes.js"></script>
  <script>
    /* Grid de categorías con contador de juegos por tipo */
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('../');
      renderizarFooter('../');

      const contenedor = document.getElementById('lista-categorias');
      contenedor.innerHTML = CATEGORIAS.map(function (cat, i) {
        const badge = `<span class="badge bg-secondary mt-2">${obtenerJuegosPorCategoria(cat.id).length} juegos</span>`;
        return crearCardCategoria(cat, '../', badge, i);
      }).join('');
    });
  </script>
</body>
</html>
