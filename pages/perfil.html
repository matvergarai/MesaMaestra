<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - MesaMaestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container perfil-main my-5">
    <div class="encabezado-pagina anim-fade-in">
      <h1 class="titulo-pagina">Modificación de Perfil</h1>
      <p class="encabezado-subtitulo">Actualiza tu información personal y los datos de tu cuenta</p>
    </div>

    <div class="formulario-perfil anim-fade-in" style="animation-delay: 0.12s">
      <form id="form-perfil" onsubmit="return validarPerfil(event)" novalidate>
        <section class="perfil-seccion" aria-labelledby="perfil-titulo-datos">
          <h2 class="perfil-seccion-titulo" id="perfil-titulo-datos">Información personal</h2>

          <div class="mb-3">
            <label for="nombreCompleto" class="form-label">Nombre completo <span class="perfil-requerido">*</span></label>
            <input type="text" class="form-control" id="nombreCompleto" name="nombreCompleto" required
              autocomplete="name">
            <div class="mensaje-error" id="error-nombreCompleto"></div>
          </div>

          <div class="mb-3">
            <label for="usuarioDisplay" class="form-label">Nombre de usuario</label>
            <input type="text" class="form-control" id="usuarioDisplay" disabled aria-readonly="true">
            <p class="perfil-ayuda">Este dato no se puede modificar.</p>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico <span class="perfil-requerido">*</span></label>
            <input type="email" class="form-control" id="email" name="email" required autocomplete="email">
            <div class="mensaje-error" id="error-email"></div>
          </div>

          <div class="mb-3">
            <label for="fechaNacimiento" class="form-label">Fecha de nacimiento <span class="perfil-requerido">*</span></label>
            <input type="date" class="form-control" id="fechaNacimiento" name="fechaNacimiento" required>
            <div class="mensaje-error" id="error-fechaNacimiento"></div>
          </div>

          <div class="mb-0">
            <label for="direccion" class="form-label">Dirección de despacho</label>
            <textarea class="form-control" id="direccion" name="direccion" rows="2"
              placeholder="Calle, número, comuna, región"></textarea>
          </div>
        </section>

        <section class="perfil-seccion" aria-labelledby="perfil-titulo-seguridad">
          <h2 class="perfil-seccion-titulo" id="perfil-titulo-seguridad">Seguridad de la cuenta</h2>
          <p class="perfil-seccion-nota">Deja los campos de contraseña en blanco si no deseas cambiarla.</p>

          <div class="mb-3">
            <label for="password" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" id="password" name="password"
              autocomplete="new-password">
            <div class="mensaje-error" id="error-password"></div>
          </div>

          <div class="mb-0">
            <label for="confirmarPassword" class="form-label">Confirmar nueva contraseña</label>
            <input type="password" class="form-control" id="confirmarPassword" name="confirmarPassword"
              autocomplete="new-password">
            <div class="mensaje-error" id="error-confirmarPassword"></div>
          </div>
        </section>

        <div class="perfil-acciones">
          <div class="mensaje-exito d-none" id="mensaje-exito-perfil"></div>
          <button type="submit" class="btn btn-principal btn-pulse w-100">Guardar cambios</button>
        </div>
      </form>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/carrito.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="../js/componentes.js"></script>
  <script>
    /* Precarga datos del usuario logueado en el formulario de edición */
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('../');
      renderizarFooter('../');

      if (!requiereSesion('../')) return;

      const sesion = obtenerSesion();
      const usuarios = obtenerUsuarios();
      const usuario = usuarios.find(u => u.usuario === sesion.usuario);

      if (usuario) {
        document.getElementById('nombreCompleto').value = usuario.nombreCompleto;
        document.getElementById('usuarioDisplay').value = usuario.usuario;
        document.getElementById('email').value = usuario.email;
        document.getElementById('fechaNacimiento').value = usuario.fechaNacimiento;
        document.getElementById('direccion').value = usuario.direccion || '';
      }
    });
  </script>
</body>
</html>
