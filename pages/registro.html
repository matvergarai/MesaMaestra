<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - MesaMaestra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilos.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container auth-main my-5">
    <div class="encabezado-pagina anim-fade-in">
      <h1 class="titulo-pagina">Crear cuenta</h1>
      <p class="encabezado-subtitulo">Únete a MesaMaestra y descubre tu próximo juego favorito</p>
    </div>

    <div class="formulario-auth formulario-auth--ancho anim-fade-in" style="animation-delay: 0.1s">
      <form id="form-registro" onsubmit="return validarRegistro(event)" novalidate>
        <section class="auth-seccion" aria-labelledby="registro-titulo-datos">
          <h2 class="auth-seccion-titulo" id="registro-titulo-datos">Datos personales</h2>

          <div class="mb-3">
            <label for="nombreCompleto" class="form-label">Nombre completo <span class="auth-requerido">*</span></label>
            <input type="text" class="form-control" id="nombreCompleto" name="nombreCompleto" required
              autocomplete="name">
            <div class="mensaje-error" id="error-nombreCompleto"></div>
          </div>

          <div class="mb-3">
            <label for="usuario" class="form-label">Nombre de usuario <span class="auth-requerido">*</span></label>
            <input type="text" class="form-control" id="usuario" name="usuario" required
              autocomplete="username">
            <div class="mensaje-error" id="error-usuario"></div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico <span class="auth-requerido">*</span></label>
            <input type="email" class="form-control" id="email" name="email" required
              autocomplete="email">
            <div class="mensaje-error" id="error-email"></div>
          </div>

          <div class="mb-0">
            <label for="fechaNacimiento" class="form-label">Fecha de nacimiento <span class="auth-requerido">*</span></label>
            <input type="date" class="form-control" id="fechaNacimiento" name="fechaNacimiento" required>
            <div class="mensaje-error" id="error-fechaNacimiento"></div>
          </div>
        </section>

        <section class="auth-seccion" aria-labelledby="registro-titulo-seguridad">
          <h2 class="auth-seccion-titulo" id="registro-titulo-seguridad">Contraseña</h2>
          <p class="auth-ayuda">Entre 6 y 18 caracteres, con mayúscula, minúscula, número y carácter especial.</p>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña <span class="auth-requerido">*</span></label>
            <input type="password" class="form-control" id="password" name="password" required
              autocomplete="new-password">
            <div class="mensaje-error" id="error-password"></div>
          </div>

          <div class="mb-0">
            <label for="confirmarPassword" class="form-label">Confirmar contraseña <span class="auth-requerido">*</span></label>
            <input type="password" class="form-control" id="confirmarPassword" name="confirmarPassword" required
              autocomplete="new-password">
            <div class="mensaje-error" id="error-confirmarPassword"></div>
          </div>
        </section>

        <section class="auth-seccion" aria-labelledby="registro-titulo-despacho">
          <h2 class="auth-seccion-titulo" id="registro-titulo-despacho">Despacho</h2>

          <div class="mb-0">
            <label for="direccion" class="form-label">Dirección <span class="auth-opcional">(opcional)</span></label>
            <textarea class="form-control" id="direccion" name="direccion" rows="2"
              placeholder="Calle, número, comuna, región"></textarea>
          </div>
        </section>

        <div class="mensaje-exito d-none" id="mensaje-exito"></div>

        <div class="auth-acciones">
          <button type="submit" class="btn btn-principal btn-pulse w-100">Crear cuenta</button>
          <button type="button" class="btn-auth-limpiar" onclick="limpiarFormulario('form-registro')">
            Limpiar formulario
          </button>
        </div>
      </form>

      <nav class="auth-enlaces" aria-label="Opciones de acceso">
        <a href="login.html" class="auth-enlace">¿Ya tienes cuenta? Inicia sesión</a>
      </nav>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/carrito.js"></script>
  <script src="../js/validaciones.js"></script>
  <script src="../js/componentes.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('../');
      renderizarFooter('../');
    });
  </script>
</body>
</html>
