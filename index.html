<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MesaMaestra - Tienda de Juegos de Mesa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <section class="hero-section text-center">
      <div class="container">
        <h1 class="display-4 hero-titulo">Bienvenido a <span class="hero-marca">MesaMaestra</span></h1>
        <p class="lead hero-subtitulo">Tu tienda especializada en juegos de mesa para todos los gustos</p>
        <a href="pages/catalogo.html" class="btn btn-secundario btn-lg btn-pulse hero-btn">Ver catálogo</a>
      </div>
    </section>

    <section class="container home-seccion">
      <div class="encabezado-seccion anim-fade-in">
        <h2 class="titulo-seccion">Nuestras Categorías</h2>
        <p class="encabezado-subtitulo">Elige el estilo de juego que más te guste explorando nuestras categorías</p>
      </div>
      <div class="row g-4" id="categorias-home"></div>
    </section>

    <section class="container home-seccion">
      <div class="encabezado-seccion anim-fade-in">
        <h2 class="titulo-seccion">Nuestros Destacados</h2>
        <p class="encabezado-subtitulo">¡Los favoritos de la tienda con precios especiales!</p>
      </div>
      <div class="row" id="destacados-home"></div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/carrito.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/componentes.js"></script>
  <script>
    /* Home: categorías destacadas y juegos en oferta */
    document.addEventListener('DOMContentLoaded', function () {
      renderizarNavbar('');
      renderizarFooter('');

      const contenedorCategorias = document.getElementById('categorias-home');
      contenedorCategorias.innerHTML = CATEGORIAS.map(function (cat, i) {
        return crearCardCategoria(cat, '', '', i);
      }).join('');

      const destacados = obtenerJuegosEnOferta().slice(0, 3);
      renderizarListaJuegos(document.getElementById('destacados-home'), destacados, '');
    });
  </script>
</body>
</html>
